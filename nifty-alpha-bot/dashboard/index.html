<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NIFTY Alpha Bot · Trading Terminal</title>
    <meta name="description" content="Professional Nifty options trading dashboard with real-time P&L, signals, and backtest analytics." />
    <meta name="theme-color" content="#060a13" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <style>
      body { background: #060a13; margin: 0; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #060a13;
        font-family: Inter, system-ui, sans-serif;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      .splash-logo {
        width: 48px; height: 48px;
        border-radius: 14px;
        background: linear-gradient(135deg, #6366f1, #22d3ee);
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 20px;
        animation: pulse-splash 2s ease-in-out infinite;
      }
      .splash-text { color: #94a3b8; font-size: 13px; font-weight: 500; letter-spacing: 0.08em; }
      .splash-bar { width: 120px; height: 2px; background: #1e293b; border-radius: 2px; margin-top: 16px; overflow: hidden; }
      .splash-fill { width: 40%; height: 100%; background: #6366f1; border-radius: 2px; animation: loading 1.5s ease-in-out infinite; }
      @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
      @keyframes pulse-splash { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-logo">
        <svg width="22" height="22" viewBox="0 0 16 16" fill="none">
          <polyline points="1,13 5,8 9,10 15,3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="15" cy="3" r="1.8" fill="white"/>
        </svg>
      </div>
      <div class="splash-text">NIFTY ALPHA</div>
      <div class="splash-bar"><div class="splash-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 500); }
        }, 600);
      });
    </script>
  </body>
</html>
