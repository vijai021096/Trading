version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nifty_trader}
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      STATE_DIR: /app/state
    volumes:
      - botstate:/app/state
      - botlogs:/app/logs
    command: python -m bot.main
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      STATE_DIR: /app/state
    volumes:
      - botstate:/app/state
      - botlogs:/app/logs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 1
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  dashboard:
    build:
      context: dashboard
      dockerfile: Dockerfile
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - dashboard
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  watchdog:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: always
    env_file: .env
    environment:
      TZ: Asia/Kolkata
      STATE_DIR: /app/state
    volumes:
      - botstate:/app/state
      - botlogs:/app/logs
    command: python -m bot.watchdog
    depends_on:
      - bot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  botstate:
  botlogs:
