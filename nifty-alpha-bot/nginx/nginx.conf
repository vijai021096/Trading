events { worker_connections 1024; }

http {
    upstream api_backend { server api:8000; }
    upstream dashboard_frontend { server dashboard:80; }

    server {
        listen 80;
        server_name _;

        # Redirect HTTP → HTTPS in production
        # return 301 https://$host$request_uri;

        # API routes
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        # WebSocket — keep alive for full trading day
        location /ws/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Dashboard SPA
        location / {
            proxy_pass http://dashboard_frontend;
            proxy_set_header Host $host;
        }
    }

    # HTTPS block (uncomment and fill in cert paths after setup)
    # server {
    #     listen 443 ssl;
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ... (same locations as above)
    # }
}
